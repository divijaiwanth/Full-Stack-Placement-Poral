<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Registration - Placement Portal</title>
    <!-- Standard Bootstrap inclusion for the user interface -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <!-- Registration card holding our company form -->
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white">
                        <h4 class="mb-0 text-center">Company Registration</h4>
                    </div>
                    <div class="card-body p-4">

                        <!-- Form collects the company details -->
                        <form method="POST" action="/register/company">
                            <div class="mb-3">
                                <label for="company_name" class="form-label">Company Name</label>
                                <input type="text" class="form-control" id="company_name" name="company_name" required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Official Email</label>
                                <!-- Typically an official contact email for the institution -->
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>

                            <div class="mb-3">
                                <label for="website" class="form-label">Company Website URL</label>
                                <input type="url" class="form-control" id="website" name="website">
                            </div>

                            <div class="mb-4">
                                <label for="hr_contact" class="form-label">HR Contact Details</label>
                                <input type="text" class="form-control" id="hr_contact" name="hr_contact">
                            </div>

                            <!-- Note that 'pending approval' is handled automatically by the backend design -->
                            <button type="submit" class="btn btn-dark w-100 mb-3">Register Company</button>

                            <div class="text-center">
                                <a href="/login" class="text-decoration-none">Already have an account? Login here</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
