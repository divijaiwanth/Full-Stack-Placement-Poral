<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post New Drive - Placement Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/company/dashboard">Company Portal</a>
            <div class="d-flex">
                <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white text-center rounded-top">
                        <h4>Post New Placement Drive</h4>
                    </div>
                    <div class="card-body p-4">
                        <form action="/company/post-drive" method="POST">
                            <div class="mb-3">
                                <label for="job_title" class="form-label">Job Title / Role</label>
                                <input type="text" class="form-control" id="job_title" name="job_title" required
                                    placeholder="e.g. Software Engineer">
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">Job Description</label>
                                <textarea class="form-control" id="description" name="description" rows="4" required
                                    placeholder="Describe the responsibilities and expectations..."></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="eligibility" class="form-label">Eligibility Criteria</label>
                                <textarea class="form-control" id="eligibility" name="eligibility" rows="2" required
                                    placeholder="e.g. Minimum 7.5 CGPA, B.Tech CSE..."></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="deadline" class="form-label">Application Deadline</label>
                                <!-- Using HTML5 date picker type -->
                                <input type="date" class="form-control" id="deadline" name="deadline" required>
                            </div>

                            <div class="d-flex justify-content-between mt-4">
                                <a href="/company/dashboard" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary px-4">Post Drive</button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>

</html>
