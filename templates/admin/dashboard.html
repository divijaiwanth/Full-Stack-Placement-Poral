<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Clean, simple styling for the Admin Dashboard -->
    <title>Admin Dashboard - Placement Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <!-- Navigation Bar for Admin Area -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/admin/dashboard">Placement Portal Admin</a>
            <div class="d-flex gap-2">
                <!-- Navigation links to other admin pages -->
                <a href="/admin/companies" class="btn btn-outline-light btn-sm border-0">Companies</a>
                <a href="/admin/students" class="btn btn-outline-light btn-sm border-0">Students</a>
                <a href="/admin/drives" class="btn btn-outline-light btn-sm border-0">Drives</a>
                <a href="/logout" class="btn btn-light btn-sm ms-3">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2>Admin Dashboard</h2>
        <p class="text-muted">Overview of placement activities.</p>
        <hr>

        <!-- Statistics Cards showing the totals passed from app.py -->
        <div class="row text-center mt-4">
            <div class="col-md-3 mb-3">
                <div class="card shadow-sm border-primary">
                    <div class="card-body">
                        <h5 class="card-title text-primary">Total Students</h5>
                        <!-- Using double curly braces to print the Python variable -->
                        <h2 class="display-5">{{ total_students }}</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-3 mb-3">
                <div class="card shadow-sm border-dark">
                    <div class="card-body">
                        <h5 class="card-title text-dark">Total Companies</h5>
                        <h2 class="display-5">{{ total_companies }}</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-3 mb-3">
                <div class="card shadow-sm border-info">
                    <div class="card-body">
                        <h5 class="card-title text-info">Total Drives</h5>
                        <h2 class="display-5">{{ total_drives }}</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-3 mb-3">
                <div class="card shadow-sm border-success">
                    <div class="card-body">
                        <h5 class="card-title text-success">Total Applications</h5>
                        <!-- Fixed total applications variable rendering -->
                        <h2 class="display-5">{{ total_applications }}</h2>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>

</html>
