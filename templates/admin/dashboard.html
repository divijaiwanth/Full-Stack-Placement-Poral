<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Clean, simple styling for the Admin Dashboard -->
    <title>Admin Dashboard - Placement Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <!-- Navigation Bar for Admin Area -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Placement Portal Admin</a>
            <div class="d-flex">
                <!-- Our simple logout button, ending the session cleanly -->
                <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
            </div>
        </div>
    </nav>

    <!-- The main interface body -->
    <div class="container mt-5">
        <div class="row">
            <div class="col-12">
                <!-- Greeting the administrator -->
                <h2>Welcome Admin</h2>
                <p class="text-muted">Manage the placement activities from here.</p>
                <hr>

                <!-- Quick links block to manage portal components later -->
                <div class="d-flex gap-3">
                    <button class="btn btn-primary" disabled>View Companies</button>
                    <button class="btn btn-success" disabled>View Students</button>
                    <button class="btn btn-info text-white" disabled>View Drives</button>
                </div>
                <!-- Adding a note explaining these aren't functional in Milestone 2 yet! -->
                <p class="mt-3 text-secondary small">* Management features will be active in later milestones.</p>
            </div>
        </div>
    </div>
</body>

</html>
