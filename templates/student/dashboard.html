<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Placement Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <!-- Simple navigation specific for the student -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="#">Placement Portal</a>
            <div class="d-flex">
                <!-- Terminates the Flask session -->
                <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
            </div>
        </div>
    </nav>

    <!-- Student Dashboard Body -->
    <div class="container mt-5">
        <div class="row">
            <div class="col-12 text-center">
                <!-- Personalized welcome, pulled straight from app.py -> template arguments -->
                <h2>Welcome {{ student.name }}</h2>
                <hr class="w-25 mx-auto">

                <!-- We will add the list of available jobs here in the future -->
                <div class="alert alert-info mt-4 d-inline-block px-5">
                    Placement drives will appear here.
                </div>
            </div>
        </div>
    </div>
</body>

</html>
