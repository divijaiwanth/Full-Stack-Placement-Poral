<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - Placement Portal</title>
    <!-- Pulling in Bootstrap for standard neat styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <!-- This card wraps our registration form nicely -->
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white">
                        <h4 class="mb-0 text-center">Student Registration</h4>
                    </div>
                    <div class="card-body p-4">

                        <!-- Form collects the student details and submits to the backend route -->
                        <form method="POST" action="/register/student" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label for="name" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="name" name="name" required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>

                            <div class="mb-3">
                                <label for="phone" class="form-label">Phone Number</label>
                                <input type="text" class="form-control" id="phone" name="phone">
                            </div>

                            <div class="mb-3">
                                <label for="education" class="form-label">Education (Degree/Branch)</label>
                                <input type="text" class="form-control" id="education" name="education">
                            </div>

                            <div class="mb-3">
                                <label for="skills" class="form-label">Skills</label>
                                <!-- We use a text area because skills can be a long list -->
                                <textarea class="form-control" id="skills" name="skills" rows="3"></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="branch" class="form-label" style="color: blueviolet;">Branch</label>
                                <input type="text" class="form-control" id="branch" name="branch">
                            </div>

                            <div class="mb-3">
                                <label for="father_name" class="form-label" style="color: blueviolet;">Fathers Name</label>
                                <input type="text" class="form-control" id="father_name" name="father_name">
                            </div>

                            <div class="mb-4">
                                <label for="resume" class="form-label">Upload Resume (.pdf)</label>
                                <input type="file" class="form-control" id="resume" name="resume">
                            </div>

                            <button type="submit" class="btn btn-success w-100 mb-3">Register</button>

                            <div class="text-center">
                                <a href="/login" class="text-decoration-none">Already have an account? Login here</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
